<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey Karo</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <h2>Journey Karo</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">Packages</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </div>
</header>

<section class="hero-section">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Explore Incredible Journeys</h1>
    <p>Luxury tours across Gujarat, Rajasthan & India.</p>

    <div class="buttons">
      <a href="#" class="btn primary">Explore Packages</a>
      <a href="#" class="btn secondary">WhatsApp Inquiry</a>
    </div>
  </div>
</section>

<section class="packages">
  <h2>Popular Packages</h2>

  <div class="package-grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop">
      <div class="content">
        <h3>Rann of Kutch</h3>
        <p>3 Days / 2 Nights</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1477587458883-47145ed94245?q=80&w=1200&auto=format&fit=crop">
      <div class="content">
        <h3>Rajasthan Tour</h3>
        <p>5 Days / 4 Nights</p>
      </div>
    </div>

  </div>
</section>

<section class="contact">
  <h2>Inquiry Form</h2>

  <form id="inquiryForm">

    <input type="text" placeholder="Name" id="name" required>
    <input type="email" placeholder="Email" id="email" required>
    <input type="text" placeholder="Phone" id="phone" required>

    <textarea placeholder="Message" id="message"></textarea>

    <button type="submit">Submit Inquiry</button>

  </form>
</section>

<script src="assets/js/app.js"></script>

</body>
</html>
